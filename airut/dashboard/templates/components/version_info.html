{# Version info bar — expects: version_info (VersionInfo), version_url (str) #}
{% if version_info %}
<div class="version-info">
    <div class="version-badges">
        <a href="{{ version_url }}" class="version-badge version-sha"
            target="_blank" rel="noopener">{{ version_info.version or version_info.git_sha }}</a>
        <span id="update-status" class="version-badge version-status checking"
            hx-get="/api/update?format=html" hx-trigger="load" hx-swap="outerHTML"
        >checking...</span>
        <span id="config-status" class="version-badge config-status"
            hx-get="/api/config-status" hx-trigger="load, every 30s"
            hx-swap="outerHTML"
        ></span>
    </div>
    <a href="/config" class="action-btn primary sm">Configure</a>
</div>
{% endif %}
