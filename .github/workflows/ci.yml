name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: airutorg/sandbox-action@main
        with:
          command: 'uv sync && uv run scripts/ci.py --verbose --timeout 0'
          pr_sha: ${{ github.event.pull_request.head.sha || github.sha }}
