name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: airutorg/sandbox-action@main
        with:
          command: >-
            cp -a /workspace /dev/shm/build &&
            cd /dev/shm/build &&
            export TMPDIR=/dev/shm/tmp && mkdir -p "$TMPDIR" &&
            uv sync &&
            uv run scripts/ci.py --workflow code --verbose --timeout 0
          pr_sha: ${{ github.event.pull_request.head.sha || github.sha }}
          sandbox_args: '--verbose --mount /dev/shm:/dev/shm'

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: airutorg/sandbox-action@main
        with:
          command: >-
            cp -a /workspace /dev/shm/build &&
            cd /dev/shm/build &&
            export TMPDIR=/dev/shm/tmp && mkdir -p "$TMPDIR" &&
            uv sync &&
            uv run scripts/ci.py --workflow security --verbose --timeout 0
          pr_sha: ${{ github.event.pull_request.head.sha || github.sha }}
          sandbox_args: '--verbose --mount /dev/shm:/dev/shm'

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: airutorg/sandbox-action@main
        with:
          command: >-
            cp -a /workspace /dev/shm/build &&
            cd /dev/shm/build &&
            export TMPDIR=/dev/shm/tmp && mkdir -p "$TMPDIR" &&
            uv sync &&
            uv run scripts/ci.py --workflow integration --verbose --timeout 0
          pr_sha: ${{ github.event.pull_request.head.sha || github.sha }}
          sandbox_args: '--verbose --mount /dev/shm:/dev/shm'
