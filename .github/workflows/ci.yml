name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync
      - name: CI checks
        run: uv run scripts/ci.py --verbose --timeout 0
