name: Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: screenshots
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --project screenshots

      - name: Install Playwright browsers and fonts
        run: |
          uv run --project screenshots playwright install chromium --with-deps
          sudo apt-get install -y --no-install-recommends fonts-inter fonts-jetbrains-mono

      - name: Generate screenshots
        run: uv run --project screenshots python screenshots/generate.py --output screenshots/output -v

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy screenshots/output --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }}
