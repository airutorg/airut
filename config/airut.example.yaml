# Airut Server Configuration
#
# Server-side settings: infrastructure, credentials, and operator controls.
# All repo-specific settings (model, limits, env vars, secrets) can be
# configured here per repo.  Repo-side .airut/airut.yaml is optional —
# if present, its container_env entries merge on top (for renaming secrets
# or adding inline values).
#
# Run `airut init` to create a stub at ~/.config/airut/airut.yaml,
# then use this file as a reference for all available options.
# Never commit real credentials.
#
# Values tagged with !env are resolved from environment variables at load
# time.  Use !env for secrets; put everything else inline.  Set env vars
# in ~/.config/airut/.env (auto-loaded by the service).

execution:
  # Maximum number of Claude containers running in parallel (global).
  max_concurrent: 3

  # Seconds to wait for running containers to finish during graceful shutdown.
  shutdown_timeout: 60

  # Conversations with no activity for this many days are garbage-collected.
  conversation_max_age_days: 7

  # Prune dangling and old container images during periodic garbage
  # collection.  Runs after conversation cleanup every 24 hours.
  image_prune: true

dashboard:
  # Enable the web dashboard for monitoring tasks and viewing actions.
  enabled: true

  # Bind address and port for the dashboard HTTP server.
  host: 127.0.0.1
  port: 5200

  # Public URL used in acknowledgment messages to link to task progress.
  # Leave empty to omit task links from messages.
  base_url: dashboard.example.com

# Container runtime executable (podman or docker).
container_command: podman

# Server-wide resource limit ceilings (all optional).
# These are maximum values — repo configs cannot exceed them.
# Omitted fields mean no ceiling for that dimension.
# resource_limits:
#   timeout: 7200       # Max allowed timeout (seconds)
#   memory: "8g"        # Max allowed memory
#   cpus: 4             # Max allowed CPUs
#   pids_limit: 1024    # Max allowed process count

# Network settings.
# network:
#   # Upstream DNS server for proxy container resolution.
#   # Auto-detected from /etc/resolv.conf when omitted.
#   upstream_dns: "1.1.1.1"

# ---------------------------------------------------------------------------
# Repositories
# ---------------------------------------------------------------------------
# Each entry under repos: defines a channel configuration + git repository.
# A repo can have email, Slack, or both channels active simultaneously.
# Every repo gets its own listeners, credentials, and secrets pool.
# Repos share the global executor pool and dashboard.

repos:
  # -------------------------------------------------------------------------
  # Example: primary repository
  # -------------------------------------------------------------------------
  my-project:
    email:
      # IMAP server for receiving emails.
      imap_server: mail.example.com
      imap_port: 993

      # SMTP server for sending reply emails.
      smtp_server: mail.example.com
      smtp_port: 587

      # Email account credentials.  Use !env to keep passwords out of this
      # file — the actual value comes from the environment / .env file.
      username: airut
      password: !env EMAIL_PASSWORD

      # From address for outgoing emails (display name + address).
      from: "Airut <airut@example.com>"

      # Only emails from these addresses/patterns (with passing DMARC) are
      # accepted. Supports wildcards for domain matching (e.g., *@company.com).
      authorized_senders:
        - you@example.com
        # - *@company.com  # Uncomment to allow any sender from company.com

      # The authserv-id to trust in Authentication-Results headers.
      # Typically the hostname of your MX server (e.g., mail.example.com).
      # Set to empty string "" for Microsoft 365/EOP, which omits the
      # authserv-id from Authentication-Results headers.
      trusted_authserv_id: mail.example.com

      # Accept X-MS-Exchange-Organization-AuthAs: Internal as authentication
      # proof for intra-org email in Microsoft 365 (where EOP omits
      # Authentication-Results entirely).  Only used when no
      # Authentication-Results header is present.  Default: false.
      # microsoft_internal_auth_fallback: true

      imap:
        # Seconds between IMAP polls (only used when use_idle is false).
        poll_interval: 30

        # Use IMAP IDLE for efficient push-based notifications (recommended).
        use_idle: true

        # Reconnect interval for IDLE mode in seconds (keep below 29 min).
        idle_reconnect_interval: 1740

      # Microsoft OAuth2 Client Credentials (for M365 / Azure AD).
      # When configured, XOAUTH2 is used instead of password auth for
      # both IMAP and SMTP.  Requires Azure AD app registration with
      # IMAP.AccessAsApp permission and Exchange Online service principal.
      # When using OAuth2, the password field above can be omitted.
      #
      # microsoft_oauth2:
      #   tenant_id: !env AZURE_TENANT_ID
      #   client_id: !env AZURE_CLIENT_ID
      #   client_secret: !env AZURE_CLIENT_SECRET

    git:
      # Repository URL cloned into each conversation workspace.
      repo_url: https://github.com/you/my-project.git

    # Named pool of secrets.  Each entry is auto-injected into the
    # container environment using the pool key as the env var name.
    # Masked secrets, signing credentials, and GitHub App credentials
    # (below) also auto-inject surrogates — no repo-side config needed.
    secrets:
      ANTHROPIC_API_KEY: !env ANTHROPIC_API_KEY

    # Default Claude model for new conversations.  Takes precedence over
    # channel hints (e.g. email subaddressing) and repo-side default_model.
    # Resumed conversations keep their stored model.  Default: opus.
    # model: opus

    # Default effort level for new conversations.  Takes precedence over
    # repo-side default_effort.
    # effort: max

    # Per-repo resource limits (all optional).
    # Clamped to server-wide ceilings if configured above.
    # resource_limits:
    #   timeout: 6000       # Max execution time in seconds (>= 10)
    #   memory: "4g"        # Memory limit, e.g. "2g", "512m"
    #   cpus: 2             # CPU limit (float, e.g. 1.5 for 1.5 cores)
    #   pids_limit: 256     # Process limit (fork bomb protection)

    # Non-secret environment variables for containers.
    # Use for inline values like bucket names, flags, etc.
    # container_env:
    #   R2_ACCOUNT_ID: "7ef1d25e..."
    #   CI: "true"

    # Network sandbox.  Both server and repo config default to true;
    # the effective value is the logical AND — if either is false,
    # the sandbox is disabled.  Useful as a break-glass override.
    #
    # network:
    #   sandbox_enabled: true

    # Masked secrets inject surrogate tokens into containers.  The proxy swaps
    # surrogates for real values only when the request host matches scopes.
    # This prevents credential exfiltration — even if the container is
    # compromised, it only has useless surrogates.
    #
    # Required fields:
    # - value: the secret value (supports !env)
    # - scopes: fnmatch patterns for hosts where replacement is allowed
    # - headers: fnmatch patterns for headers to scan (e.g., "*" for all)
    #
    # Basic Auth is automatically decoded/re-encoded for Authorization headers.
    masked_secrets:
      GH_TOKEN:
        value: !env GH_TOKEN
        scopes:
          - "api.github.com"
          - "*.githubusercontent.com"
        headers:
          - "Authorization"

    # Signing credentials handle AWS-style request signing (SigV4/SigV4A).
    # Unlike masked secrets (which replace tokens in headers), the proxy
    # re-signs outbound requests with real AWS credentials.  Containers
    # receive format-preserving surrogates that the AWS SDK uses normally.
    #
    # Each field has a name (the secret name repos reference via !secret)
    # and a value (the real credential).  The repo config is transparent —
    # it uses !secret AWS_ACCESS_KEY_ID just like any other secret.
    #
    # Works with any S3-compatible API (AWS, Cloudflare R2, MinIO, etc.).
    # signing_credentials:
    #   AWS_PROD:
    #     type: aws-sigv4
    #     access_key_id:
    #       name: AWS_ACCESS_KEY_ID
    #       value: !env AWS_ACCESS_KEY_ID
    #     secret_access_key:
    #       name: AWS_SECRET_ACCESS_KEY
    #       value: !env AWS_SECRET_ACCESS_KEY
    #     session_token:                       # optional (STS temp credentials)
    #       name: AWS_SESSION_TOKEN
    #       value: !env AWS_SESSION_TOKEN
    #     scopes:
    #       - "*.amazonaws.com"

    # GitHub App credentials use proxy-managed token rotation for GitHub
    # API access.  The proxy generates short-lived installation tokens
    # from the App's private key and rotates them automatically.
    # Containers receive a surrogate token (ghs_...) that the proxy
    # replaces with a real token on matching requests.
    #
    # Recommended over masked_secrets for GitHub — real credentials
    # never enter the container, and tokens auto-expire within 1 hour.
    # See doc/github-app-setup.md for the full setup guide.
    # github_app_credentials:
    #   GH_TOKEN:
    #     app_id: !env GH_APP_ID                    # Client ID (Iv23li...)
    #     private_key: !env GH_APP_PRIVATE_KEY       # PEM-encoded RSA key
    #     installation_id: !env GH_APP_INSTALLATION_ID
    #     scopes:
    #       - "github.com"
    #       - "api.github.com"
    #       - "*.githubusercontent.com"
    #     # Optional: restrict token permissions (subset of app's grants)
    #     # permissions:
    #     #   contents: write
    #     #   pull_requests: write
    #     # Optional: restrict token to specific repos
    #     # repositories:
    #     #   - "my-repo"

    # Slack channel (optional, can coexist with email).
    # See config/slack-app-manifest.json for app setup.
    #
    # slack:
    #   # Bot token (xoxb-...) from OAuth & Permissions page.
    #   bot_token: !env SLACK_BOT_TOKEN
    #
    #   # App-level token (xapp-...) for Socket Mode.
    #   app_token: !env SLACK_APP_TOKEN
    #
    #   # Authorization rules (evaluated in order, first match wins).
    #   authorized:
    #     # Allow all full workspace members:
    #     - workspace_members: true
    #     # Or restrict to a user group (requires usergroups:read scope):
    #     # - user_group: engineering
    #     # Or restrict to specific users:
    #     # - user_id: U12345678

  # -------------------------------------------------------------------------
  # Example: additional repository (uncomment to use)
  # A repo can use email, Slack, or both channels.
  # -------------------------------------------------------------------------
  # another-repo:
  #   # Email channel
  #   email:
  #     imap_server: mail.example.com
  #     smtp_server: mail.example.com
  #     username: airut-other
  #     password: !env OTHER_EMAIL_PASSWORD
  #     from: "Airut <airut-other@example.com>"
  #     authorized_senders:
  #       - you@example.com
  #     trusted_authserv_id: mail.example.com
  #
  #   # Slack channel
  #   slack:
  #     bot_token: !env OTHER_SLACK_BOT_TOKEN
  #     app_token: !env OTHER_SLACK_APP_TOKEN
  #     authorized:
  #       - workspace_members: true
  #
  #   git:
  #     repo_url: https://github.com/you/another-repo.git
  #   secrets:
  #     ANTHROPIC_API_KEY: !env ANTHROPIC_API_KEY
  #     GH_TOKEN: !env GH_TOKEN
