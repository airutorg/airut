# Airut Server Configuration
#
# Server-side settings: infrastructure, credentials, and per-repo controls.
# All per-repo configuration (model, effort, resource limits, container env,
# network, secrets) is managed here.  There is no repo-side airut.yaml —
# only .airut/network-allowlist.yaml and .airut/container/Dockerfile live
# in the repository.
#
# Run `airut init` to create a stub at ~/.config/airut/airut.yaml,
# then use this file as a reference for all available options.
# Never commit real credentials.
#
# Values tagged with !env are resolved from environment variables at load
# time.  Use !env for secrets; put everything else inline.  Set env vars
# in ~/.config/airut/.env (auto-loaded by the service).
#
# Use the vars: section to define shared values.  Reference them anywhere
# with !var.  This avoids repeating the same server address, API key, or
# token across multiple repos.
#
# vars:
#   mail_server: mail.example.com
#   anthropic_key: sk-ant-api03-...
#   gh_token: !env GH_TOKEN           # vars can reference !env too

# execution:
#   # Maximum parallel Claude containers across all repos
#   max_concurrent: 3
#
#   # Seconds to wait for running tasks during graceful shutdown
#   shutdown_timeout: 60
#
#   # Max age in days before conversations are garbage-collected
#   conversation_max_age_days: 7
#
#   # Prune dangling container images during garbage collection
#   image_prune: true

# dashboard:
#   # Enable the web dashboard for task monitoring
#   enabled: true
#
#   # Dashboard HTTP server bind address
#   host: 127.0.0.1
#
#   # Dashboard HTTP server port
#   port: 5200
#
#   # Public URL for dashboard links in emails (None = omit links)
#   base_url: dashboard.example.com

# Container runtime command (podman or docker)
# container_command: podman

# Server-wide default resource limits for containers
# resource_limits:
#   # Max container execution time in seconds
#   timeout: 7200
#   # Memory limit for container (e.g. '512m', '2g')
#   memory: "8g"
#   # CPU limit for container (supports fractional cores, e.g. 1.5)
#   cpus: 4
#   # Process limit for container
#   pids_limit: 1024

# network:
#   # Upstream DNS server for proxy resolution (None = auto-detect)
#   upstream_dns: "1.1.1.1"

# ---------------------------------------------------------------------------
# Repositories
# ---------------------------------------------------------------------------
# Each entry under repos: defines a channel configuration + git repository.
# A repo can have email, Slack, or both channels active simultaneously.

repos:
  # -------------------------------------------------------------------------
  # Example: primary repository
  # -------------------------------------------------------------------------
  my-project:
    email:
      # IMAP server hostname
      imap_server: mail.example.com

      # IMAP port
      imap_port: 993

      # SMTP server hostname
      smtp_server: mail.example.com

      # SMTP port
      smtp_port: 587

      # Email account username
      username: airut

      # Email account password
      password: !env EMAIL_PASSWORD

      # From address for outgoing emails
      from: "Airut <airut@example.com>"

      # Email patterns allowed to send commands (e.g. *@company.com)
      authorized_senders:
        - you@example.com
        # - *@company.com

      # Trusted authserv-id in Authentication-Results headers
      trusted_authserv_id: mail.example.com

      # Whether SMTP requires authentication
      # smtp_require_auth: true

      # Accept X-MS-Exchange AuthAs: Internal
      # microsoft_internal_auth_fallback: false

      # imap:
      #   # Max IMAP connection attempts before giving up
      #   connect_retries: 3
      #
      #   # Seconds between IMAP polls
      #   poll_interval: 60
      #
      #   # Use IMAP IDLE instead of polling
      #   use_idle: true
      #
      #   # Reconnect interval for IDLE mode (seconds)
      #   idle_reconnect_interval: 1740

      # microsoft_oauth2:
      #   # Azure AD tenant ID for OAuth2 client credentials flow
      #   tenant_id:
      #
      #   # Azure AD application (client) ID
      #   client_id:
      #
      #   # Azure AD client secret value
      #   client_secret:

    git:
      # Git repository URL to clone from
      repo_url: https://github.com/you/my-project.git

    # Per-repo secrets pool (keys become container env var names)
    # secrets:
    #   ANTHROPIC_API_KEY: !env ANTHROPIC_API_KEY

    # Secrets with scope restrictions for proxy replacement
    # masked_secrets:
    #   GH_TOKEN:
    #     value: !env GH_TOKEN
    #     scopes:
    #       - "api.github.com"
    #       - "*.githubusercontent.com"
    #     headers:
    #       - "Authorization"

    # AWS SigV4/SigV4A signing credentials for proxy re-signing
    # signing_credentials:
    #   AWS_PROD:
    #     type: aws-sigv4
    #     access_key_id:
    #       name: AWS_ACCESS_KEY_ID
    #       value: !env AWS_ACCESS_KEY_ID
    #     secret_access_key:
    #       name: AWS_SECRET_ACCESS_KEY
    #       value: !env AWS_SECRET_ACCESS_KEY
    #     session_token:
    #       name: AWS_SESSION_TOKEN
    #       value: !env AWS_SESSION_TOKEN
    #     scopes:
    #       - "*.amazonaws.com"

    # GitHub App credentials for proxy-managed token rotation
    # github_app_credentials:
    #   GH_TOKEN:
    #     app_id: !env GH_APP_ID
    #     private_key: !env GH_APP_PRIVATE_KEY
    #     installation_id: !env GH_APP_INSTALLATION_ID
    #     scopes:
    #       - "github.com"
    #       - "api.github.com"
    #       - "*.githubusercontent.com"

    # Claude model for new conversations
    # model: opus

    # Effort level for Claude Code (None = Claude default)
    # effort: max

    # Per-repo container resource limits (timeout, memory, cpus, pids)
    # resource_limits:
    #   # Max container execution time in seconds
    #   timeout: 7200
    #   # Memory limit for container (e.g. '512m', '2g')
    #   memory: "8g"
    #   # CPU limit for container (supports fractional cores, e.g. 1.5)
    #   cpus: 4
    #   # Process limit for container
    #   pids_limit: 1024

    # Plain environment variables passed to containers
    # container_env:
    #   BUCKET_NAME: "my-bucket"

    # network:
    #   # Enable the network sandbox (proxy toggle)
    #   sandbox_enabled: true

    # Slack channel (can coexist with email).
    # See config/slack-app-manifest.json for app setup.
    # slack:
      # Bot User OAuth Token (xoxb-...) for Slack API calls
      # bot_token: !env SLACK_BOT_TOKEN

      # App-Level Token (xapp-...) for Socket Mode WebSocket
      # app_token: !env SLACK_APP_TOKEN

      # Authorization rules (first match grants access)
      # authorized:
      #   # Allow all full workspace members:
      #   - workspace_members: true
      #   # Or restrict to a user group (requires usergroups:read scope):
      #   # - user_group: engineering
      #   # Or restrict to specific users:
      #   # - user_id: U12345678
