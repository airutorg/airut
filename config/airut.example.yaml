# Airut Server Configuration
#
# AUTO-GENERATED — do not edit by hand.
# Source: airut/config/generate.py  (schema in airut/gateway/config.py)
# Regenerate: uv run python -m airut.config.generate
#
# Server-side settings: infrastructure, credentials, and per-repo controls.
# All per-repo configuration (model, effort, resource limits, container env,
# network, secrets) is managed here.  There is no repo-side airut.yaml —
# only .airut/network-allowlist.yaml and the container Dockerfile (default
# .airut/container/Dockerfile, configurable via container_path) live in the
# repository.
#
# Run `airut init` to create a stub at ~/.config/airut/airut.yaml,
# then use this file as a reference for all available options.
# Never commit real credentials.
#
# Values tagged with !env are resolved from environment variables at load
# time.  Use !env for secrets; put everything else inline.  Set env vars
# in ~/.config/airut/.env (auto-loaded by the service).
#
# Use the vars: section to define shared values.  Reference them anywhere
# with !var.  This avoids repeating the same server address, API key, or
# token across multiple repos.  Resource limits are a common use case:
# define defaults as variables and reference them from each repo.
#
# vars:
#   mail_server: mail.example.com
#   anthropic_key: sk-ant-api03-...
#   gh_token: !env GH_TOKEN           # vars can reference !env too
#   default_resource_timeout: 7200    # shared resource limit defaults
#   default_resource_memory: "8g"
#   default_resource_cpus: 4
#   default_resource_pids_limit: 1024

# execution:
#   # Maximum parallel Claude containers across all repos
#   max_concurrent: 3
#
#   # Seconds to wait for running tasks during graceful shutdown
#   shutdown_timeout: 60
#
#   # Max age in days before conversations are garbage-collected
#   conversation_max_age_days: 7
#
#   # Prune dangling container images during garbage collection
#   image_prune: true

# dashboard:
#   # Enable the web dashboard for task monitoring
#   enabled: true
#
#   # Dashboard HTTP server bind address
#   host: 127.0.0.1
#
#   # Dashboard HTTP server port
#   port: 5200
#
#   # Public URL for dashboard links in emails (omitted if empty)
#   base_url: dashboard.example.com

# network:
#   # Upstream DNS server for proxy resolution (auto-detected if empty)
#   upstream_dns: "1.1.1.1"

# ---------------------------------------------------------------------------
# Repositories
# ---------------------------------------------------------------------------
# Each entry under repos: defines a channel configuration + git repository.
# A repo can have email, Slack, or both channels active simultaneously.

repos:
  # -------------------------------------------------------------------------
  # Example: primary repository
  # -------------------------------------------------------------------------
  my-project:
    email:
      # Email account credentials
      account:
        # Email account username
        username: airut
        # From address for outgoing emails
        from: "Airut <airut@example.com>"
        # Email account password (not required with OAuth2)
        # password: !env EMAIL_PASSWORD

      # IMAP server settings
      imap:
        # IMAP server hostname
        server: mail.example.com
        # IMAP port
        # port: 993
        # Max IMAP connection attempts before giving up
        # connect_retries: 3
        # Seconds between IMAP polls
        # poll_interval: 60
        # Use IMAP IDLE instead of polling
        # use_idle: true
        # IDLE reconnect interval in seconds (servers may close after 30 min)
        # idle_reconnect_interval: 1740

      # SMTP server settings
      smtp:
        # SMTP server hostname
        server: mail.example.com
        # SMTP port
        # port: 587
        # Whether SMTP requires authentication
        # require_auth: true

      # Sender authorization settings
      auth:
        # Email patterns allowed to send commands (e.g. *@company.com)
        authorized_senders:
          - you@example.com
          # - *@company.com
        # Trusted authserv-id for DMARC verification (empty string for Microsoft 365)
        trusted_authserv_id: mail.example.com
        # Accept Microsoft 365 intra-org messages when DMARC headers are absent
        # microsoft_internal_fallback: false

      # Microsoft 365 OAuth2 credentials
      # microsoft_oauth2:
      #   # Azure AD tenant ID for OAuth2 client credentials flow
      #   tenant_id: !env MS_OAUTH2_TENANT_ID
      #   # Azure AD application (client) ID
      #   client_id: !env MS_OAUTH2_CLIENT_ID
      #   # Azure AD client secret value
      #   client_secret: !env MS_OAUTH2_CLIENT_SECRET

    # Git repository URL to clone from
    repo_url: https://github.com/you/my-project.git

    # Per-repo secrets pool (keys become container env var names)
    # secrets:
    #   ANTHROPIC_API_KEY: !env ANTHROPIC_API_KEY

    # Scoped secrets replaced by proxy at request time (requires network sandbox)
    # masked_secrets:
    #   GH_TOKEN:
    #     value: !env GH_TOKEN
    #     scopes:
    #       - "api.github.com"
    #       - "*.githubusercontent.com"
    #     headers:
    #       - "Authorization"
    #     allow_foreign_credentials: false

    # AWS SigV4/SigV4A signing credentials for proxy re-signing
    # signing_credentials:
    #   AWS_PROD:
    #     type: aws-sigv4
    #     access_key_id:
    #       name: AWS_ACCESS_KEY_ID
    #       value: !env AWS_ACCESS_KEY_ID
    #     secret_access_key:
    #       name: AWS_SECRET_ACCESS_KEY
    #       value: !env AWS_SECRET_ACCESS_KEY
    #     session_token:
    #       name: AWS_SESSION_TOKEN
    #       value: !env AWS_SESSION_TOKEN
    #     scopes:
    #       - "*.amazonaws.com"

    # GitHub App credentials for proxy-managed token rotation
    # github_app_credentials:
    #   GH_TOKEN:
    #     app_id: !env GH_APP_ID
    #     private_key: !env GH_APP_PRIVATE_KEY
    #     installation_id: !env GH_APP_INSTALLATION_ID
    #     scopes:
    #       - "github.com"
    #       - "api.github.com"
    #       - "*.githubusercontent.com"
    #     allow_foreign_credentials: false
    #     base_url: "https://api.github.com"
    #     permissions:
    #       contents: write
    #       pull_requests: write
    #     repositories:
    #       - my-repo

    # Claude model for new conversations
    # model: opus

    # Effort level: low, medium, high, or max (empty = Claude default)
    # effort: max

    # Container resource limits (use !var for shared defaults)
    # resource_limits:
    #   # Max execution time in seconds (minimum 10)
    #   timeout: !var default_resource_timeout
    #   # Memory limit (e.g. 512m, 2g)
    #   memory: !var default_resource_memory
    #   # CPU limit (e.g. 1.5 for one and a half cores)
    #   cpus: !var default_resource_cpus
    #   # Max number of processes in the container
    #   pids_limit: !var default_resource_pids_limit

    # Claude Code version (semver, 'latest', or 'stable')
    # claude_version: latest

    # Path to container directory within the repo (must contain a Dockerfile)
    # container_path: .airut/container

    # Periodic task schedules keyed by name
    # schedules:
    #   # Prompt mode: run Claude with a fixed prompt on a schedule
    #   daily-report:
    #     cron: "0 9 * * 1-5"
    #     prompt: >
    #       Summarize recent changes and open issues.
    #     deliver:
    #       to: team@example.com
    #     # enable: true
    #     # subject: Daily Report
    #     # timezone: America/New_York
