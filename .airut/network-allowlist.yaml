# Network allowlist for Claude Code containers.
#
# Only hosts listed here are reachable from inside the container.
# All other traffic is blocked by the mitmproxy-based network proxy.
#
# To request access to a new host, add it here and submit a PR.
# See doc/network-sandbox.md for details.
#
# This file is read from the git mirror (main branch), not from the
# conversation workspace.  Changes take effect after merging to main.
#
# Pattern matching uses fnmatch-style wildcards (* and ?):
#   - "*.github.com" matches "api.github.com" but NOT "github.com"
#   - "/api/*" matches "/api/foo" but NOT "/api"
#   - "/api" matches only "/api" exactly (no implicit prefix matching)

# Domains: all paths and methods allowed (exact match unless wildcards used)
domains: []

# URL patterns: domain + path pattern required (fnmatch wildcards supported)
url_prefixes:
  # Anthropic API — path-restricted to prevent exfiltration via /v1/files
  # endpoint (attacker can use their own API key to upload material they can
  # later fetch).  Only the paths Claude Code actually needs are allowed.
  - host: api.anthropic.com
    path: /v1/messages*
    methods: [POST]
  - host: api.anthropic.com
    path: /api/oauth/*
    methods: [GET]
  - host: api.anthropic.com
    path: /api/event_logging/*
    methods: [POST]
  - host: api.anthropic.com
    path: /api/eval/*
    methods: [POST]
  - host: api.anthropic.com
    path: /api/claude_code_*
    methods: [GET]

  # Claude telemetry and error reporting (POST-only)
  - host: statsig.anthropic.com
    path: ""
    methods: [POST]

  # Python packages — read-only (uv sync in entrypoint)
  - host: pypi.org
    path: ""
    methods: [GET, HEAD]
  - host: files.pythonhosted.org
    path: ""
    methods: [GET, HEAD]

  # GitHub — restricted to airutorg repositories
  - host: github.com
    path: /airutorg/airut*
    methods: [GET, HEAD, POST]
  - host: github.com
    path: /airutorg/sandbox-action*
    methods: [GET, HEAD, POST]
  - host: api.github.com
    path: /repos/airutorg/airut*
  - host: api.github.com
    path: /repos/airutorg/sandbox-action*
  - host: api.github.com
    path: /graphql
    methods: [POST]
  - host: uploads.github.com
    path: /repos/airutorg/airut*
    methods: [POST]
  - host: uploads.github.com
    path: /repos/airutorg/sandbox-action*
    methods: [POST]
  - host: raw.githubusercontent.com
    path: /airutorg/airut*
    methods: [GET, HEAD]
  - host: raw.githubusercontent.com
    path: /airutorg/sandbox-action*
    methods: [GET, HEAD]
  - host: objects.githubusercontent.com
    path: /airutorg/airut*
    methods: [GET, HEAD]
  - host: objects.githubusercontent.com
    path: /airutorg/sandbox-action*
    methods: [GET, HEAD]
  - host: results-receiver.actions.githubusercontent.com
    path: /rest/runs*
    methods: [GET, POST]

  # htmx vendored dependency — security advisory checks (CI) and downloads (update script)
  - host: api.github.com
    path: /advisories*
    methods: [GET]
  - host: api.github.com
    path: /repos/bigskysoftware/htmx*
    methods: [GET]
  - host: unpkg.com
    path: /htmx.org*
    methods: [GET, HEAD]
  - host: unpkg.com
    path: /htmx-ext-sse*
    methods: [GET, HEAD]

  # Slack API documentation — read-only reference
  - host: docs.slack.dev
    path: ""
    methods: [GET, HEAD]

  # Playwright browser downloads — screenshot generator
  # cdn.playwright.dev redirects to storage.googleapis.com for actual binaries
  - host: cdn.playwright.dev
    path: ""
    methods: [GET, HEAD]
  - host: storage.googleapis.com
    path: /chrome-for-testing-public/*
    methods: [GET, HEAD]
